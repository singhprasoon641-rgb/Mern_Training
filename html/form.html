<!DOCTYPE html>
<html>
<head>
    <title>BBD University Registration Form</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>

    
            
            
    <form>
        <h2>BBD University Registration Form</h2>
        <label for="fname" >First Name:</label>
        <input type="text" id="fname" name="fname" required placeholder="Enter the first name">
        

        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname" required placeholder="Enter the last name">
        

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" required placeholder="Enter the phone number">
        

        <label for="roll">Roll Number:</label>
        <input type="text" id="roll" name="roll" required placeholder="Enter the roll number">
        
        
        <label for="address">Address:</label><br>
        <textarea id="address" name="address" rows="2" cols="30" required placeholder="enter the Address"></textarea>
        


        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="Enter the email">
        

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required placeholder="Enter the Password">
        

        <input type="submit" value="Submit" id="button">
        <input type="reset" value="Reset" id="button">
    </form>

</body>
</html>
